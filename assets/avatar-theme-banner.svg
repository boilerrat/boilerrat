<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="boilerrat cyberpunk banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04030c"/>
      <stop offset="55%" stop-color="#0a0f2a"/>
      <stop offset="100%" stop-color="#140a2e"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f7ff"/>
      <stop offset="50%" stop-color="#4dff7a"/>
      <stop offset="100%" stop-color="#ff2bd6"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2a44" stroke-width="1" opacity="0.45"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>

  <ellipse cx="1020" cy="70" rx="170" ry="95" fill="#00f7ff" opacity="0.12"/>
  <ellipse cx="180" cy="285" rx="190" ry="90" fill="#ff2bd6" opacity="0.10"/>

  <rect x="58" y="58" width="18" height="18" fill="#56f07e"/>
  <rect x="78" y="58" width="18" height="18" fill="#56f07e"/>
  <rect x="98" y="58" width="18" height="18" fill="#547a2f"/>
  <rect x="118" y="58" width="18" height="18" fill="#2f95ff"/>
  <rect x="138" y="58" width="18" height="18" fill="#e11d2e"/>

  <rect x="58" y="86" width="4" height="182" fill="url(#neon)" filter="url(#glow)"/>

  <text x="84" y="130" font-size="56" font-family="Inter,Segoe UI,Roboto,Arial,sans-serif" fill="#f7fbff" font-weight="700" filter="url(#glow)">boilerrat</text>
  <text x="84" y="174" font-size="24" font-family="Inter,Segoe UI,Roboto,Arial,sans-serif" fill="#b8ccff">DAO ops • Automation • Market systems</text>
  <text x="84" y="212" font-size="18" font-family="Inter,Segoe UI,Roboto,Arial,sans-serif" fill="#81ffd3">pixel-brained builder // process over noise</text>

  <g stroke="#00f7ff" stroke-width="1.3" opacity="0.75" filter="url(#glow)">
    <path d="M900 104 L942 125 L984 146 L1026 167 L1068 188" fill="none"/>
    <circle cx="900" cy="104" r="3" fill="#00f7ff"/>
    <circle cx="942" cy="125" r="3" fill="#4dff7a"/>
    <circle cx="984" cy="146" r="3" fill="#00f7ff"/>
    <circle cx="1026" cy="167" r="3" fill="#ff2bd6"/>
    <circle cx="1068" cy="188" r="3" fill="#4dff7a"/>
  </g>
</svg>