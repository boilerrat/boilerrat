<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Boilerrat avatar-themed banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b1a"/>
      <stop offset="100%" stop-color="#0d1324"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#56f07e"/>
      <stop offset="100%" stop-color="#2f95ff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <circle cx="1020" cy="64" r="130" fill="#56f07e" opacity="0.14" filter="url(#soft)"/>
  <circle cx="200" cy="286" r="130" fill="#2f95ff" opacity="0.15" filter="url(#soft)"/>

  <!-- Pixel motif from avatar palette -->
  <g opacity="0.9">
    <rect x="62" y="60" width="20" height="20" fill="#56f07e"/>
    <rect x="84" y="60" width="20" height="20" fill="#56f07e"/>
    <rect x="106" y="60" width="20" height="20" fill="#547a2f"/>
    <rect x="128" y="60" width="20" height="20" fill="#2f95ff"/>
    <rect x="150" y="60" width="20" height="20" fill="#e11d2e"/>
  </g>

  <rect x="62" y="88" width="4" height="180" fill="url(#line)"/>

  <text x="88" y="132" font-size="54" font-family="Inter,Segoe UI,Roboto,Arial,sans-serif" fill="#f8fafc" font-weight="700">boilerrat</text>
  <text x="88" y="175" font-size="24" font-family="Inter,Segoe UI,Roboto,Arial,sans-serif" fill="#dbe3f0">DAO ops • Automation • Market systems</text>
  <text x="88" y="214" font-size="18" font-family="Inter,Segoe UI,Roboto,Arial,sans-serif" fill="#8ca0bf">Pixel-brained builder. Process over noise.</text>

  <g transform="translate(860,194)">
    <rect width="280" height="86" rx="14" fill="#0b1220" stroke="#30415f"/>
    <text x="18" y="34" font-size="15" font-family="Inter,Segoe UI,Roboto,Arial,sans-serif" fill="#e8eef8">THEME COLORS</text>
    <rect x="18" y="48" width="22" height="22" fill="#56f07e"/>
    <rect x="46" y="48" width="22" height="22" fill="#547a2f"/>
    <rect x="74" y="48" width="22" height="22" fill="#2f95ff"/>
    <rect x="102" y="48" width="22" height="22" fill="#e11d2e"/>
    <rect x="130" y="48" width="22" height="22" fill="#d9cfab"/>
  </g>
</svg>